name: backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/rust.yml
  pull_request:
    paths:
      - backend/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/rust.yml
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mergequeue_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      MQ_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/mergequeue_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        # Serial: the engine tests share one mergequeue_test database and TRUNCATE
        # between cases, so they must not run concurrently (belt-and-suspenders to
        # the in-process DB_LOCK).
        run: cargo test --all -- --test-threads=1
